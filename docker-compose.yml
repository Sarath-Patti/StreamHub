version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: streamhub-postgres
    restart: always
    environment:
      POSTGRES_USER: streamhub
      POSTGRES_PASSWORD: streamhubpassword
      POSTGRES_DB: streamhub
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: streamhub-backend
    restart: always
    environment:
      PORT: 4000
      NODE_ENV: production
      DATABASE_URL: postgresql://streamhub:streamhubpassword@postgres:5432/streamhub?schema=public
    ports:
      - '4000:4000'
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: streamhub-frontend
    restart: always
    ports:
      - '3000:80'
    depends_on:
      - backend

volumes:
  postgres_data:
