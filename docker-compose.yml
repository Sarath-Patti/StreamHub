version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: streamhub-postgres
    restart: always
    environment:
      POSTGRES_USER: streamhub
      POSTGRES_PASSWORD: streamhubpassword
      POSTGRES_DB: streamhub
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streamhub -d streamhub"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: streamhub-backend
    restart: always
    environment:
      PORT: 4000
      NODE_ENV: production
      DATABASE_URL: postgresql://streamhub:streamhubpassword@postgres:5432/streamhub?schema=public
      JWT_SECRET: supersecretkeystreamhub123!
      JWT_REFRESH_SECRET: supersecretrefreshkeystreamhub123!
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: streamhub-frontend
    restart: always
    ports:
      - '3000:80'
    depends_on:
      - backend

volumes:
  postgres_data:
